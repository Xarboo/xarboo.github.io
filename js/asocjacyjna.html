<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gear Hub Pro - Management</title>
    <style>
        :root {
            --jade-primary: #00a86b;
            --jade-hover: #00cc82;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent-gold: #ffcc33;
            --danger: #ff4d4d;
        }

        body {
            background: linear-gradient(135deg, #001a11 0%, #004d33 100%);
            background-attachment: fixed;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: white;
            padding: 40px 0;
        }

        .content-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            max-width: 900px;
            width: 95%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 { text-align: center; letter-spacing: 3px; color: var(--jade-primary); margin-top: 0; }

        /* Formularz i Filtrowanie */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
        }

        input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            padding: 10px;
            border-radius: 6px;
            color: white;
        }

        .search-bar {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            border-left: 4px solid var(--accent-gold);
            font-size: 1rem;
        }

        /* Lista i Kafelki */
        #inventory-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }

        .gear-item {
            background: rgba(255, 255, 255, 0.08);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            cursor: grab;
            position: relative;
            transition: transform 0.2s, background 0.2s;
            user-select: none;
        }

        .gear-item:active { cursor: grabbing; }
        .gear-item.dragging { opacity: 0.4; transform: scale(0.95); }

        .gear-item strong { color: var(--accent-gold); display: block; font-size: 0.8rem; }
        .gear-item b { font-size: 1.1rem; }

        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 5px;
            opacity: 0.5;
            transition: 0.3s;
        }

        .delete-btn:hover { opacity: 1; transform: scale(1.2); }

        .btn-add {
            background: var(--jade-primary);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            grid-column: 1 / -1;
            padding: 10px;
            border-radius: 6px;
        }

        .btn-add:hover { background: var(--jade-hover); }

        .back-link { display: block; text-align: center; margin-top: 30px; color: white; opacity: 0.5; text-decoration: none; }
    </style>
</head>
<body>

    <div class="content-card">
        <h1>🎸 Gear Inventory Management</h1>
        
        <div class="controls">
            <div class="form-grid">
                <input type="text" id="itemName" placeholder="Nazwa (np. Jazzmaster)">
                <input type="text" id="itemType" placeholder="Typ (np. Gitara)">
                <input type="text" id="itemBrand" placeholder="Marka">
                <input type="text" id="itemPrice" placeholder="Cena">
                <button class="btn-add" onclick="addToInventory()">DODAJ SPRZĘT</button>
            </div>

            <input type="text" id="filterInput" class="search-bar" placeholder="🔍 Szukaj sprzętu lub marki..." oninput="renderInventory()">
        </div>

        <div id="inventory-list">
            </div>

        <a href="index.html" class="back-link">← Powrót do Directory</a>
    </div>

    <script>
        // Dane początkowe
        let inventory = [
            { id: Date.now() + 1, nazwa: "Stratocaster", typ: "Gitara", marka: "Fender", cena: "7200 zł" },
            { id: Date.now() + 2, nazwa: "Katana MkII", typ: "Wzmacniacz", marka: "Boss", cena: "1200 zł" },
            { id: Date.now() + 3, nazwa: "Cry Baby", typ: "Efekt", marka: "Dunlop", cena: "550 zł" }
        ];

        // GŁÓWNA FUNKCJA RENDERUJĄCA
        function renderInventory() {
            const list = document.getElementById('inventory-list');
            const filterValue = document.getElementById('filterInput').value.toLowerCase();
            list.innerHTML = '';

            inventory
                .filter(item => 
                    item.nazwa.toLowerCase().includes(filterValue) || 
                    item.marka.toLowerCase().includes(filterValue)
                )
                .forEach((item, index) => {
                    const div = document.createElement('div');
                    div.className = 'gear-item';
                    div.draggable = true;
                    div.dataset.index = index;
                    
                    div.innerHTML = `
                        <button class="delete-btn" onclick="deleteItem(${item.id})">×</button>
                        <strong>${item.typ}</strong>
                        <b>${item.marka}</b> ${item.nazwa}<br>
                        <span style="color: #aaa">${item.cena}</span>
                    `;

                    // Obsługa Drag & Drop
                    div.addEventListener('dragstart', () => div.classList.add('dragging'));
                    div.addEventListener('dragend', () => div.classList.remove('dragging'));

                    list.appendChild(div);
                });
        }

        // LOGIKA DRAG & DROP
        const listContainer = document.getElementById('inventory-list');
        listContainer.addEventListener('dragover', e => {
            e.preventDefault();
            const draggingItem = document.querySelector('.dragging');
            const siblings = [...listContainer.querySelectorAll('.gear-item:not(.dragging)')];
            
            const nextSibling = siblings.find(sibling => {
                return e.clientY <= sibling.offsetTop + sibling.offsetHeight / 2;
            });

            listContainer.insertBefore(draggingItem, nextSibling);
        });

        // DODAWANIE
        function addToInventory() {
            const name = document.getElementById('itemName').value;
            const type = document.getElementById('itemType').value;
            const brand = document.getElementById('itemBrand').value;
            const price = document.getElementById('itemPrice').value;

            if(name && brand) {
                inventory.push({ id: Date.now(), nazwa: name, typ: type, marka: brand, cena: price });
                renderInventory();
                ["itemName", "itemType", "itemBrand", "itemPrice"].forEach(id => document.getElementById(id).value = '');
            }
        }

        // USUWANIE
        function deleteItem(id) {
            inventory = inventory.filter(item => item.id !== id);
            renderInventory();
        }

        // Start
        renderInventory();
    </script>
</body>
</html>
