<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Project Hub</title>
    <style>
        :root {
            --jade-primary: #00a86b;
            --jade-dark: #007d51;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            background: linear-gradient(135deg, #00a86b 0%, #004d33 100%);
            background-attachment: fixed;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: white;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 900px;
            padding: 20px;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 3px;
            margin-bottom: 40px;
            text-transform: uppercase;
            text-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .link-box {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }

        .link-box:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.3);
        }

        a {
            text-decoration: none;
            color: white;
            display: block;
            padding: 30px 20px;
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .link-box a::before {
            content: '📄';
            margin-right: 10px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>JS Learning Directory</h1>
        
        <div class="links-grid">
            <div class="link-box"><a href="F.html">F.html</a></div>
            <div class="link-box"><a href="Js.html">Js.html</a></div>
            <div class="link-box"><a href="zmienne.html">zmienne.html</a></div>
            <div class="link-box"><a href="tablica.html">tablica.html</a></div>
            <div class="link-box"><a href="is.html">is.html</a></div>
            <div class="link-box"><a href="operatory.html">operatory.html</a></div>
            <div class="link-box"><a href="asocjacyjna.html">asocjacyjna.html</a></div>
        </div>
    </div
</body>
</html>
